name = "imagematte"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

[env.production]
REMOVEBG_API_KEY = "{{REMOVEBG_API_KEY}}"

[[kv_namespaces]]
binding = "IMAGEMATTE_CACHE"
id = ""  # 需要创建后填写

[vars]
NEXT_PUBLIC_APP_NAME = "ImageMatte"
NEXT_PUBLIC_APP_VERSION = "1.0.0"

[build]
command = "npm run build"
output_dir = ".next"

[build.upload]
format = "directory"
dir = ".next"