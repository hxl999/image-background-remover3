name = "imagematte"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

[vars]
NEXT_PUBLIC_APP_NAME = "ImageMatte"
NEXT_PUBLIC_APP_VERSION = "1.0.0"

[build]
command = "npm run build"
output_dir = ".next"

[build.upload]
format = "directory"
dir = ".next"

[env.production]
vars = { NEXT_PUBLIC_APP_ENV = "production" }